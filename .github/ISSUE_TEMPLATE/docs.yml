name: '📚 文档改进建议'
description: 提交文档错误、缺失说明或改进建议。
title: '[Docs] '
labels: [ 'type/docs' ]
body:
  - type: markdown
    attributes:
      value: |
        感谢您抽出时间帮助我们改进文档！如果您发现 README（EN / 中）、配置说明、API 文档、示例代码或 MCP 使用引导存在错误、缺失或难以理解的地方，请通过该模板告诉我们。

  - type: textarea
    attributes:
      label: 文档问题描述
      description: 请简要说明你发现了什么问题。
      placeholder: >
        如: README 中某个配置项（如 assessor_model）说明过于简略，实际使用时不清楚其取值范围和影响。
    validations:
      required: true

  - type: textarea
    attributes:
      label: 涉及的文档位置
      description: 请提供相关文档名称、章节标题或文件路径。
      placeholder: >
        如: README.md 的 "Using it as a library" 章节，或 README.zh-CN.md 对应段落。
    validations:
      required: true

  - type: textarea
    attributes:
      label: 你期望如何改进？
      description: 请描述你认为更清晰的写法、应补充的信息，或你希望看到的示例。
      placeholder: >
        如: 希望补充字段含义、默认值、示例配置，以及 steward / companion 两种模式下的行为差异说明。
    validations:
      required: true

  - type: dropdown
    attributes:
      label: 文档问题类型
      description: 请选择最接近的一项。
      options:
        - '内容错误或过期'
        - '说明缺失或不完整'
        - '示例不足或难以复现'
        - '表述不清晰，容易误解'
        - '中英文版本（README.md / README.zh-CN.md）不一致'
        - '排版、格式或链接问题'
        - '其他'
    validations:
      required: true

  - type: dropdown
    attributes:
      label: 相关使用方式（可选）
      description: 如果该文档问题只与某种用法相关，请选择最接近的一项；如与所有用法通用，可留空。
      options:
        - '作为 Python 库导入 (import yelos / SessionManager)'
        - 'MCP server — stdio 模式 (python -m yelos)'
        - 'MCP server — streamable-http 模式 (YELOS_TRANSPORT=streamable-http)'
        - '通用，与使用方式无关'

  - type: textarea
    attributes:
      label: 使用背景（可选）
      description: 如果该问题与你的 Yelos 版本、Python 版本或安装方式有关，可以在这里补充。
      placeholder: >
        如: Yelos v0.1.0，Python 3.11，pip install -e . 源码安装。

  - type: textarea
    attributes:
      label: 可参考的内容（可选）
      description: 如你已经写好了建议文案、示例配置、截图或对照资料，可在这里附上。
      placeholder: >
        可粘贴建议文本、示例配置、截图链接或其他补充材料。

  - type: checkboxes
    attributes:
      label: 你愿意提交 PR 吗？
      description: 这不是必须的，但我们欢迎您直接参与文档改进。
      options:
        - label: 是的，我愿意提交 PR!

  - type: checkboxes
    attributes:
      label: Code of Conduct
      options:
        - label: >
            我已阅读并同意遵守该项目的 [行为准则](https://docs.github.com/zh/site-policy/github-terms/github-community-code-of-conduct)。
          required: true

  - type: markdown
    attributes:
      value: '感谢您填写我们的表单！'

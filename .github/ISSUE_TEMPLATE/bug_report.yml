name: '🐛 报告 Bug'
description: 提交报告帮助我们改进。
title: '[Bug] '
labels: [ 'type/fix' ]
body:
  - type: markdown
    attributes:
      value: |
        感谢您抽出时间报告问题！请准确解释您的问题。如果可能，请提供一个可复现的最小片段（这有助于更快地解决问题）。

  - type: textarea
    attributes:
      label: 发生了什么
      description: 描述你遇到的异常。
      placeholder: >
        一个清晰且具体的描述这个异常是什么。
    validations:
      required: true

  - type: textarea
    attributes:
      label: 如何复现？
      description: 复现该问题的步骤，最好附带最小可复现代码。
      placeholder: >
        如: 1. `manager.bind(sid, mode="companion")` 2. 调用 `manager.arbitrate(...)` 3. ...
    validations:
      required: true

  - type: input
    attributes:
      label: Yelos 版本
      description: 请填写你当前使用的 Yelos 版本（`pyproject.toml` 的 `version`，或 `pip show yelos`）。
      placeholder: '如: v0.1.0'
    validations:
      required: true

  - type: input
    attributes:
      label: Python 版本
      description: 请填写 `python --version` 的输出。
      placeholder: '如: 3.11.4'
    validations:
      required: true

  - type: dropdown
    attributes:
      label: 使用方式
      description: 你是把 Yelos 当库导入，还是当 MCP server 跑？
      options:
        - '作为 Python 库导入 (import yelos / SessionManager)'
        - 'MCP server — stdio 模式 (python -m yelos)'
        - 'MCP server — streamable-http 模式 (YELOS_TRANSPORT=streamable-http)'
        - '不确定'
    validations:
      required: true

  - type: dropdown
    attributes:
      label: 安装方式
      description: 请选择最接近的一项。
      options:
        - 'pip install yelos'
        - 'uv add yelos'
        - '源码 editable 安装 (pip install -e .)'
        - '其他'
        - '不确定'
    validations:
      required: true

  - type: dropdown
    attributes:
      label: 操作系统
      description: 你在哪个操作系统上遇到了这个问题？
      options:
        - 'Windows'
        - 'macOS'
        - 'Linux'
        - 'Other'
        - 'Not sure'
    validations:
      required: true

  - type: textarea
    attributes:
      label: 补充说明（可选）
      description: 如涉及自定义 `data_dir`、`engine_data_dir`、`assessor_model` 配置，或与 `sylanne-core` 的联动异常，请在这里补充。
      placeholder: >
        如: 未安装 sylanne-core，SessionManager 走 degraded 模式；或使用了非默认 data_dir。

  - type: textarea
    attributes:
      label: 报错日志
      description: 如报错日志、堆栈、截图等。请提供完整日志，不要介意它很长！
      placeholder: >
        请提供完整的报错日志或截图。
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: 你愿意提交 PR 吗？
      description: 这不是必需的，但我们很乐意在贡献过程中为您提供指导，特别是如果你已经很好地理解了如何实现修复。
      options:
        - label: 是的，我愿意提交 PR!

  - type: checkboxes
    attributes:
      label: Code of Conduct
      options:
        - label: >
            我已阅读并同意遵守该项目的 [行为准则](https://docs.github.com/zh/site-policy/github-terms/github-community-code-of-conduct)。
          required: true

  - type: markdown
    attributes:
      value: '感谢您填写我们的表单！'

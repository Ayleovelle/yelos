name: '❓ 使用咨询 / 问题讨论'
description: 提交咨询、排查思路或开放性讨论。
title: '[Discussion] '
labels: [ 'type/discussion' ]
body:
  - type: markdown
    attributes:
      value: |
        感谢您抽出时间发起讨论！如果您暂时不能确定这是否是 Yelos 的 Bug，或者希望先进行使用咨询、库/MCP 用法排查、方案讨论，都可以使用该模板。

  - type: textarea
    attributes:
      label: 你想实现什么？
      description: 请描述你的目标、预期效果，或你当前想确认的问题。
      placeholder: >
        如: 我希望在 companion 模式下让 impulse() 只返回 dream 类型的消息，但不确定当前是否支持，还是需要自己过滤。
    validations:
      required: true

  - type: textarea
    attributes:
      label: 当前实际情况
      description: 请描述你目前观察到的现象、输出结果或不符合预期的行为。
      placeholder: >
        如: SessionManager 已成功 bind，但 impulse() 一直返回空列表，日志里也没有明显报错。
    validations:
      required: true

  - type: textarea
    attributes:
      label: 你已经尝试过哪些方法？
      description: 请简要说明你已经做过的排查、对照或临时处理方式。
      placeholder: >
        如: 已检查 yelos.config.json 配置、重跑了 pytest -q、切换过 stdio / streamable-http 两种传输、对照 README 重新配置。
    validations:
      required: true

  - type: dropdown
    attributes:
      label: 你目前对问题性质的判断
      description: 这有助于我们更快判断后续应继续讨论、补文档，还是转为 Bug。
      options:
        - '不确定，想先确认是否为预期行为'
        - '可能是 Yelos Bug，但还不能确定'
        - '更像是配置、安装或运行环境相关问题'
        - '更像是使用方式或文档理解问题'
    validations:
      required: true

  - type: input
    attributes:
      label: Yelos 版本
      description: 请填写你当前使用的 Yelos 版本（`pyproject.toml` 的 `version`，或 `pip show yelos`）。
      placeholder: '如: v0.1.0'
    validations:
      required: true

  - type: input
    attributes:
      label: Python 版本
      description: 请填写 `python --version` 的输出。
      placeholder: '如: 3.11.4'
    validations:
      required: true

  - type: dropdown
    attributes:
      label: 使用方式
      description: 请选择你当前使用或排查的方式。
      options:
        - '作为 Python 库导入 (import yelos / SessionManager)'
        - 'MCP server — stdio 模式 (python -m yelos)'
        - 'MCP server — streamable-http 模式 (YELOS_TRANSPORT=streamable-http)'
        - '不确定'
    validations:
      required: true

  - type: dropdown
    attributes:
      label: 操作系统
      description: 你当前主要运行在什么操作系统上？
      options:
        - 'Windows'
        - 'macOS'
        - 'Linux'
        - 'Other'
        - 'Not sure'
    validations:
      required: true

  - type: textarea
    attributes:
      label: 补充说明（可选）
      description: 如涉及自定义 data_dir / engine_data_dir、sylanne-core 是否安装、或 degraded 模式相关，请在这里补充。
      placeholder: >
        如: 未安装 sylanne-core，怀疑是否走了 degraded 模式；部署在容器内，data_dir 挂载在临时卷上等。

  - type: textarea
    attributes:
      label: 相关配置、日志或截图
      description: 如相关配置片段、控制台输出、截图等。涉及隐私信息时请先脱敏。
      placeholder: >
        请尽量提供能帮助定位问题的配置、日志或截图。

  - type: checkboxes
    attributes:
      label: 你愿意在结论明确后提交 PR 或协助补充文档吗？
      description: 这不是必需的，但如果你愿意参与后续修复或补充说明，会非常有帮助。
      options:
        - label: 是的，我愿意在问题明确后协助推进。

  - type: checkboxes
    attributes:
      label: Code of Conduct
      options:
        - label: >
            我已阅读并同意遵守该项目的 [行为准则](https://docs.github.com/zh/site-policy/github-terms/github-community-code-of-conduct)。
          required: true

  - type: markdown
    attributes:
      value: '感谢您填写我们的表单！'

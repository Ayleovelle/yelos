# 通用 tag → GitHub Release：推送形如 vX.Y.Z 的 tag 即触发，Release 正文从 CHANGELOG.md
# 中摘取对应版本条目。
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Extract version from tag
        id: get_version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted tag: $TAG (version: $VERSION)"

      - name: Check if release exists
        id: check_release
        run: |
          if gh release view "${{ steps.get_version.outputs.tag }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.get_version.outputs.tag }} already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.get_version.outputs.tag }} does not exist"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract changelog for version
        if: steps.check_release.outputs.exists == 'false'
        id: get_changelog
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          echo "Looking for version: $VERSION"

          # 创建 Python 脚本文件来提取 changelog
          cat > extract_changelog.py << 'PYTHON_SCRIPT'
          import re
          import sys

          version = sys.argv[1]

          try:
              with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
                  content = f.read()
          except FileNotFoundError:
              print('See commit history for this release.')
              sys.exit(0)

          # 匹配指定版本的内容 (匹配 "## [X.Y.Z]" 到下一个 "## [" 或文件结尾)。
          # 日期后缀可选：本仓 CHANGELOG.md 的版本标题不带日期（如 "## [0.1.0]"），
          # 但同时兼容 "## [X.Y.Z] - YYYY-MM-DD" 这种带日期的写法。
          pattern = rf'## \[{re.escape(version)}\](?:\s*-\s*\d{{4}}-\d{{2}}-\d{{2}})?\s*\n(.*?)(?=\n## \[|\Z)'
          match = re.search(pattern, content, re.DOTALL)

          if match:
              changelog = match.group(1).strip()
              # 末版条目一直延伸到文件结尾，会带上结尾的 `---` 分隔线与脚注段落；
              # 截到第一条水平分隔线为止，保持 Release 正文干净。
              changelog = re.split(r'\n---\s*\n', changelog)[0].strip()
              if changelog:
                  print(changelog)
              else:
                  print('See commit history for this release.')
          else:
              print('See commit history for this release.')
          PYTHON_SCRIPT

          # 执行 Python 脚本并将输出写入文件
          python3 extract_changelog.py "$VERSION" > changelog_output.txt

          # 读取文件内容到变量
          CHANGELOG=$(cat changelog_output.txt)

          # 如果 changelog 为空，使用默认提示
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="See commit history for this release."
          fi

          echo "Extracted changelog:"
          echo "$CHANGELOG"

          # 写入 GitHub Actions 输出
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # 清理临时文件
          rm -f extract_changelog.py changelog_output.txt

      - name: Create Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: ${{ steps.get_version.outputs.tag }}
          body: ${{ steps.get_changelog.outputs.changelog }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

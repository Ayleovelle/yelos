name: CI

on: [push, pull_request]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package + test tooling
        # sylanne-core (the affect engine SDK) resolves from PyPI as a declared dependency.
        run: pip install -e . ruff pytest pytest-asyncio PyYAML
      - name: Lint
        run: ruff check .
      - name: Tests
        run: python -m pytest -q
